<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password ➫ hitpoint.pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: #0c0c10;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      color: #e0e0f0;
    }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    #card {
      background: rgba(13,15,23,0.99); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px; padding: 36px 32px; max-width: 380px; width: 100%;
      text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }
    #icon { font-size: 2.4rem; line-height: 1; margin-bottom: 18px; }
    #title {
      font-size: 13px; font-weight: 800; letter-spacing: 3px;
      text-transform: uppercase; color: #d0d0e0; margin-bottom: 10px;
    }
    #message {
      font-size: 13px; color: rgba(255,255,255,0.45);
      line-height: 1.6; letter-spacing: 0.3px; margin-bottom: 24px;
    }
    #message.success { color: #3ddd88; }
    #message.error   { color: #ff6070; }
    #message:empty   { margin-bottom: 0; }

    form { display: flex; flex-direction: column; gap: 12px; text-align: left; }
    label {
      font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: rgba(255,255,255,0.45);
      display: block; margin-bottom: 5px;
    }
    input[type="password"] {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 7px;
      color: #e0e0f0; font-size: 14px; padding: 10px 13px;
      outline: none; transition: border-color 0.15s;
    }
    input[type="password"]:focus { border-color: rgba(200,20,20,0.7); }
    #inline-error {
      font-size: 12px; color: #ff6070; min-height: 16px; margin-top: -4px;
    }
    button[type="submit"] {
      margin-top: 4px;
      background: rgba(200,20,20,0.85); border: none; border-radius: 6px;
      color: #fff; font-size: 11px; font-weight: 800; letter-spacing: 1.5px;
      text-transform: uppercase; padding: 11px 22px;
      cursor: pointer; transition: background 0.15s; width: 100%;
    }
    button[type="submit"]:hover:not(:disabled) { background: rgba(220,30,30,0.95); }
    button[type="submit"]:disabled { opacity: 0.55; cursor: not-allowed; }

    #chat-link {
      display: inline-block;
      background: rgba(200,20,20,0.85); border: none; border-radius: 6px;
      color: #fff; font-size: 11px; font-weight: 800; letter-spacing: 1.5px;
      text-transform: uppercase; text-decoration: none;
      padding: 10px 22px; transition: background 0.15s; margin-top: 8px;
    }
    #chat-link:hover { background: rgba(220,30,30,0.95); }
    #chat-link.hidden { display: none; }

    #spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.12);
      border-top-color: rgba(255,255,255,0.5);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="card">
    <div id="icon">&#128274;</div>
    <div id="title">Reset Password</div>
    <div id="message"></div>

    <form id="form" novalidate>
      <div>
        <label for="pw">New Password</label>
        <input id="pw" type="password" minlength="8" placeholder="Min. 8 characters" autocomplete="new-password" required>
      </div>
      <div>
        <label for="pw2">Confirm New Password</label>
        <input id="pw2" type="password" minlength="8" placeholder="Repeat password" autocomplete="new-password" required>
      </div>
      <div id="inline-error"></div>
      <button type="submit" id="submit-btn">Reset Password</button>
    </form>

    <a id="chat-link" href="https://hitpoint.pro/live" class="hidden">Go to Live</a>
  </div>

  <script>
    const API = 'https://chat.hitpoint.pro/api';
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');

    const iconEl   = document.getElementById('icon');
    const titleEl  = document.getElementById('title');
    const msgEl    = document.getElementById('message');
    const formEl   = document.getElementById('form');
    const pwEl     = document.getElementById('pw');
    const pw2El    = document.getElementById('pw2');
    const errEl    = document.getElementById('inline-error');
    const btnEl    = document.getElementById('submit-btn');
    const linkEl   = document.getElementById('chat-link');

    if (!token) {
      iconEl.textContent = '\u2715';
      titleEl.textContent = 'Invalid Link';
      msgEl.textContent = 'Invalid or missing reset token.';
      msgEl.className = 'error';
      formEl.style.display = 'none';
    }

    formEl.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.textContent = '';

      const password = pwEl.value;
      const confirm  = pw2El.value;

      if (password.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters.';
        return;
      }
      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        return;
      }

      btnEl.disabled = true;
      btnEl.innerHTML = '<span id="spinner"></span>Resetting\u2026';

      try {
        const res  = await fetch(`${API}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json().catch(() => ({}));

        if (res.ok) {
          iconEl.textContent = '\u2713';
          titleEl.textContent = 'Password Reset';
          msgEl.textContent = 'Password reset successfully! You can now log in.';
          msgEl.className = 'success';
          formEl.style.display = 'none';
          linkEl.classList.remove('hidden');
        } else {
          errEl.textContent = data.error || data.message || 'Something went wrong. Please try again.';
          btnEl.disabled = false;
          btnEl.textContent = 'Reset Password';
        }
      } catch {
        errEl.textContent = 'Could not reach the server. Please try again.';
        btnEl.disabled = false;
        btnEl.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>

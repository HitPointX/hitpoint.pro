<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify Email — hitpoint.pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: #0c0c10;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      color: #e0e0f0;
    }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    #card {
      background: rgba(13,15,23,0.99); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px; padding: 36px 32px; max-width: 380px; width: 100%;
      text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }
    #icon { font-size: 2.4rem; line-height: 1; margin-bottom: 18px; }
    #title {
      font-size: 13px; font-weight: 800; letter-spacing: 3px;
      text-transform: uppercase; color: #d0d0e0; margin-bottom: 10px;
    }
    #message {
      font-size: 13px; color: rgba(255,255,255,0.45);
      line-height: 1.6; letter-spacing: 0.3px; margin-bottom: 24px;
    }
    #message.success { color: #3ddd88; }
    #message.error   { color: #ff6070; }
    #chat-link {
      display: inline-block;
      background: rgba(200,20,20,0.85); border: none; border-radius: 6px;
      color: #fff; font-size: 11px; font-weight: 800; letter-spacing: 1.5px;
      text-transform: uppercase; text-decoration: none;
      padding: 10px 22px; transition: background 0.15s;
    }
    #chat-link:hover { background: rgba(220,30,30,0.95); }
    #chat-link.hidden { display: none; }
    #spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.12);
      border-top-color: rgba(255,255,255,0.5);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-bottom: 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="card">
    <div id="icon"><div id="spinner"></div></div>
    <div id="title">Email Verification</div>
    <div id="message">Verifying your email address…</div>
    <a id="chat-link" href="/chat/" class="hidden">Go to Chat</a>
  </div>

  <script>
    const API = 'https://chat.hitpoint.pro/api';
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');

    const iconEl    = document.getElementById('icon');
    const msgEl     = document.getElementById('message');
    const linkEl    = document.getElementById('chat-link');
    const titleEl   = document.getElementById('title');

    async function verify() {
      if (!token) {
        iconEl.textContent = '✕';
        titleEl.textContent = 'Invalid Link';
        msgEl.textContent = 'No verification token found. Please use the link from your email.';
        msgEl.className = 'error';
        return;
      }

      try {
        const res = await fetch(`${API}/auth/verify-email?token=${encodeURIComponent(token)}`);
        const data = await res.json().catch(() => ({}));

        if (res.ok) {
          iconEl.textContent = '✓';
          titleEl.textContent = 'Email Verified';
          msgEl.textContent = 'Your email has been verified. You can now log in and start chatting.';
          msgEl.className = 'success';
          linkEl.classList.remove('hidden');
        } else {
          iconEl.textContent = '✕';
          titleEl.textContent = 'Verification Failed';
          msgEl.textContent = data.error || data.message || 'This link may have expired or already been used.';
          msgEl.className = 'error';
          linkEl.textContent = 'Go to Chat';
          linkEl.classList.remove('hidden');
        }
      } catch {
        iconEl.textContent = '✕';
        titleEl.textContent = 'Error';
        msgEl.textContent = 'Could not reach the server. Please try again.';
        msgEl.className = 'error';
      }
    }

    verify();
  </script>
</body>
</html>

  <meta charset="UTF-8" />
  <title>HitPoint - LIVE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: #f2f2f2;
      background:
        radial-gradient(circle at 20% -10%, rgba(154, 45, 76, 0.26), transparent 48%),
        radial-gradient(circle at 90% 95%, rgba(138, 36, 66, 0.2), transparent 52%),
        #0c0c10;
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 10px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 0 0 1px rgba(154, 45, 76, 0.35),
        0 0 56px rgba(138, 36, 66, 0.18),
        inset 0 0 48px rgba(154, 45, 76, 0.12);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(72% 72% at -12% -14%, rgba(136, 18, 38, 0.86) 0%, rgba(136, 18, 38, 0.46) 21%, rgba(136, 18, 38, 0.2) 37%, rgba(136, 18, 38, 0.08) 54%, transparent 73%),
        radial-gradient(72% 72% at 112% 114%, rgba(136, 18, 38, 0.86) 0%, rgba(136, 18, 38, 0.46) 21%, rgba(136, 18, 38, 0.2) 37%, rgba(136, 18, 38, 0.08) 54%, transparent 73%),
        repeating-radial-gradient(circle at -12% -14%, rgba(162, 38, 58, 0.16) 0 1.5px, rgba(92, 16, 31, 0.08) 1.5px 3px, transparent 3px 32px),
        repeating-radial-gradient(circle at 112% 114%, rgba(162, 38, 58, 0.16) 0 1.5px, rgba(92, 16, 31, 0.08) 1.5px 3px, transparent 3px 32px);
      background-size: 100% 100%, 100% 100%, 124% 124%, 124% 124%;
      opacity: 0.56;
      mix-blend-mode: screen;
      filter: saturate(0.96) brightness(0.82) contrast(1.05);
      animation: corner-bleed 6.6s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes corner-bleed {
      0%,
      100% {
        opacity: 0.48;
        filter: saturate(0.95) brightness(0.8) contrast(1.08);
        transform: scale(1.008);
        background-size: 100% 100%, 100% 100%, 118% 118%, 118% 118%;
      }
      30% {
        opacity: 0.64;
        filter: saturate(1.06) brightness(0.92) contrast(1.08);
        transform: scale(1.026);
        background-size: 103% 103%, 103% 103%, 130% 130%, 130% 130%;
      }
      55% {
        opacity: 0.78;
        filter: saturate(1.22) brightness(1.1) contrast(1.12);
        transform: scale(1.045);
        background-size: 108% 108%, 108% 108%, 146% 146%, 146% 146%;
      }
      78% {
        opacity: 0.58;
        filter: saturate(1.03) brightness(0.9) contrast(1.08);
        transform: scale(1.02);
        background-size: 102% 102%, 102% 102%, 134% 134%, 134% 134%;
      }
    }

    .redirect-card {
      width: min(100%, 520px);
      background: rgba(10, 12, 18, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(5px);
      padding: 26px 24px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .redirect-card h1 {
      margin: 0 0 10px;
      font-size: clamp(1.15rem, 2.5vw, 1.5rem);
      letter-spacing: 0.8px;
      text-transform: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: pre;
      line-height: 1.1;
      min-height: 1.3em;
    }

    #redirect-title {
      font-variant-caps: all-small-caps;
      font-feature-settings: "smcp" 1, "c2sc" 1;
      letter-spacing: 1.35px;
      font-weight: 700;
    }

    #redirect-title .glitch-char {
      display: inline-block;
      position: relative;
      z-index: 1;
      isolation: isolate;
      color: #06060a;
      text-shadow: 0 0 0.2px rgba(96, 12, 28, 0.45);
      will-change: transform, filter, color;
    }

    #redirect-title .glitch-char::before,
    #redirect-title .glitch-char::after {
      content: attr(data-char);
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      color: transparent;
      -webkit-text-fill-color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
    }

    #redirect-title .glitch-char::before {
      background: linear-gradient(132deg, rgba(158, 28, 48, 0.86) 8%, rgba(94, 12, 29, 0.9) 60%, rgba(172, 44, 40, 0.58) 100%);
      transform: translate(0.24px, -0.22px);
      opacity: 0.62;
      filter: saturate(1.04);
    }

    #redirect-title .glitch-char::after {
      background: linear-gradient(305deg, rgba(182, 40, 56, 0.52) 0%, rgba(82, 10, 24, 0.82) 62%, rgba(138, 26, 34, 0.42) 100%);
      transform: translate(-0.2px, 0.18px);
      opacity: 0.46;
    }

    #redirect-title .glitch-char.space {
      width: 0.38em;
    }

    #redirect-title .glitch-char.space::before,
    #redirect-title .glitch-char.space::after {
      content: none;
    }

    #redirect-title .glitch-char.is-glitching {
      animation: title-glitch 200ms steps(1, end) 1;
    }

    @keyframes title-glitch {
      0% {
        transform: translate(0, 0);
        color: #06060a;
        filter: none;
      }
      20% {
        transform: translate(-1px, 0);
        filter: drop-shadow(-1px 0 rgba(158, 28, 48, 0.72)) drop-shadow(1px 0 rgba(92, 12, 29, 0.6));
      }
      45% {
        transform: translate(1px, -0.5px);
        color: #180d17;
        filter: blur(0.22px) saturate(1.06);
      }
      70% {
        transform: translate(-1px, 0.5px);
        filter: drop-shadow(1px 0 rgba(186, 44, 46, 0.62)) drop-shadow(-1px 0 rgba(98, 14, 24, 0.6));
      }
      100% {
        transform: translate(0, 0);
        color: #06060a;
        filter: none;
      }
    }

    .redirect-card p {
      margin: 0 0 18px;
      color: rgba(255, 255, 255, 0.74);
      font-size: 0.95rem;
    }

    .live-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      background: linear-gradient(135deg, #23252d 0%, #4a4d56 74%, #4f4953 87%, #8a2442 100%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #fff;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      transition: transform 0.15s ease, border-color 0.15s ease;
      box-shadow:
        0 6px 14px rgba(0, 0, 0, 0.36),
        inset -1px -1px 0 rgba(172, 45, 82, 0.28),
        inset 0 -3px 6px rgba(150, 32, 66, 0.15);
    }

    .live-link:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .live-link .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fff;
      animation: live-dot 1.8s ease-in-out infinite;
    }

    @keyframes live-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.28; }
    }
  </style>
  <meta http-equiv="refresh" content="3; url=https://hitpoint.pro/live" />
  <script>
    // JavaScript fallback redirect :P
    setTimeout(() => { window.location.href = "https://hitpoint.pro/live"; }, 3000);

    // Toned-down per-letter glitch for redirect title.
    document.addEventListener("DOMContentLoaded", () => {
      const titleEl = document.getElementById("redirect-title");
      if (!titleEl) return;

      const titleText = titleEl.textContent;
      titleEl.textContent = "";

      const letters = [];
      for (const [index, ch] of [...titleText].entries()) {
        const span = document.createElement("span");
        span.className = "glitch-char";
        span.textContent = ch;
        span.dataset.char = ch;
        if (ch === " ") span.classList.add("space");
        if (/[A-Za-z0-9]/.test(ch)) {
          letters.push({ el: span, index });
        }
        titleEl.appendChild(span);
      }

      const glitchOnce = (entry) => {
        if (Math.random() > 0.2) {
          entry.el.classList.add("is-glitching");
          setTimeout(() => entry.el.classList.remove("is-glitching"), 180 + Math.random() * 90);
        }
      };

      const pulseLetter = (entry) => {
        const base = 700 + (entry.index % 4) * 240;
        const jitter = 500 + Math.random() * 450;
        const wait = base + jitter;

        setTimeout(() => {
          if (!document.body.contains(entry.el)) return;
          glitchOnce(entry);
          pulseLetter(entry);
        }, wait);
      };

      letters.forEach((entry) => {
        const initial = 120 + Math.random() * 640;
        setTimeout(() => {
          if (!document.body.contains(entry.el)) return;
          glitchOnce(entry);
          pulseLetter(entry);
        }, initial);
      });
    });
  </script>

<body>
  <main class="redirect-card" aria-live="polite">
    <h1 id="redirect-title">HitPoint - LIVE</h1>
    <p>Redirecting you to the stream now.</p>
    <a class="live-link" href="https://hitpoint.pro/live"><span class="dot"></span>Go to Live</a>
  </main>

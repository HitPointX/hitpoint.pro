  <meta charset="UTF-8" />
  <title>HitPoint - LIVE</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: #f2f2f2;
      background:
        radial-gradient(circle at center, rgba(8, 9, 14, 0.96) 0%, rgba(8, 9, 14, 0.92) 36%, rgba(8, 9, 14, 0.58) 54%, rgba(8, 9, 14, 0) 74%),
        radial-gradient(circle at 18% -8%, rgba(124, 26, 50, 0.2), transparent 42%),
        radial-gradient(circle at 88% 104%, rgba(110, 20, 42, 0.18), transparent 44%),
        #0b0c10;
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 10px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 0 0 1px rgba(154, 45, 76, 0.3),
        0 0 56px rgba(138, 36, 66, 0.14),
        inset 0 0 48px rgba(154, 45, 76, 0.09);
      pointer-events: none;
      z-index: 0;
      animation: border-hue-shift 16s ease-in-out infinite;
    }

    @keyframes border-hue-shift {
      0%        { filter: hue-rotate(0deg)    saturate(0)   brightness(0.75); }
      20%       { filter: hue-rotate(-140deg) saturate(1.1) brightness(0.82); }
      42%       { filter: hue-rotate(-160deg) saturate(1.3) brightness(1.0);  }
      66%       { filter: hue-rotate(0deg)    saturate(1.2) brightness(0.9);  }
      88%       { filter: hue-rotate(0deg)    saturate(0.1) brightness(0.72); }
      100%      { filter: hue-rotate(0deg)    saturate(0)   brightness(0.75); }
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(58% 58% at -12% -14%, rgba(132, 20, 38, 0.72) 0%, rgba(132, 20, 38, 0.36) 20%, rgba(132, 20, 38, 0.14) 34%, rgba(132, 20, 38, 0.05) 46%, transparent 60%),
        radial-gradient(58% 58% at 112% 114%, rgba(132, 20, 38, 0.72) 0%, rgba(132, 20, 38, 0.36) 20%, rgba(132, 20, 38, 0.14) 34%, rgba(132, 20, 38, 0.05) 46%, transparent 60%),
        repeating-radial-gradient(circle at -12% -14%, rgba(152, 34, 52, 0.1) 0 1.2px, rgba(88, 15, 28, 0.05) 1.2px 2.4px, transparent 2.4px 42px),
        repeating-radial-gradient(circle at 112% 114%, rgba(152, 34, 52, 0.1) 0 1.2px, rgba(88, 15, 28, 0.05) 1.2px 2.4px, transparent 2.4px 42px);
      background-size: 100% 100%, 100% 100%, 112% 112%, 112% 112%;
      opacity: 0.44;
      mix-blend-mode: screen;
      filter: saturate(0) brightness(0.6) contrast(1.08);
      animation: corner-bleed 16s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes corner-bleed {
      /* black & white start */
      0% {
        opacity: 0.22;
        filter: saturate(0) brightness(0.58) contrast(1.1);
        transform: scale(1.0);
        background-size: 100% 100%, 100% 100%, 108% 108%, 108% 108%;
      }
      /* deep navy blue */
      20% {
        opacity: 0.32;
        filter: saturate(1.1) brightness(0.72) contrast(1.1) hue-rotate(-145deg);
        transform: scale(1.012);
        background-size: 102% 102%, 102% 102%, 114% 114%, 114% 114%;
      }
      /* baby blue */
      42% {
        opacity: 0.38;
        filter: saturate(1.4) brightness(0.96) contrast(1.12) hue-rotate(-165deg);
        transform: scale(1.022);
        background-size: 104% 104%, 104% 104%, 120% 120%, 120% 120%;
      }
      /* crimson red */
      66% {
        opacity: 0.34;
        filter: saturate(1.3) brightness(0.84) contrast(1.12) hue-rotate(0deg);
        transform: scale(1.016);
        background-size: 103% 103%, 103% 103%, 116% 116%, 116% 116%;
      }
      /* fade back to black & white */
      88% {
        opacity: 0.24;
        filter: saturate(0.1) brightness(0.62) contrast(1.1) hue-rotate(0deg);
        transform: scale(1.004);
        background-size: 100% 100%, 100% 100%, 109% 109%, 109% 109%;
      }
      /* black & white end */
      100% {
        opacity: 0.22;
        filter: saturate(0) brightness(0.58) contrast(1.1);
        transform: scale(1.0);
        background-size: 100% 100%, 100% 100%, 108% 108%, 108% 108%;
      }
    }

    #bh-layer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
      z-index: 0;
      opacity: 0.48;
      mix-blend-mode: screen;
    }

    #fan-layer {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(52vw, 780px);
      min-width: 360px;
      pointer-events: none;
      z-index: 2;
      opacity: 0.54;
      mix-blend-mode: screen;
      filter: saturate(0.92) brightness(0.78) contrast(1.08);
      animation: fan-hue-shift 16s ease-in-out infinite;
    }

    @keyframes fan-hue-shift {
      0%   { filter: saturate(0)    brightness(0.6)  contrast(1.06); }
      20%  { filter: saturate(1.0)  brightness(0.72) contrast(1.06) hue-rotate(-145deg); }
      42%  { filter: saturate(1.3)  brightness(0.9)  contrast(1.08) hue-rotate(-165deg); }
      66%  { filter: saturate(1.1)  brightness(0.8)  contrast(1.08) hue-rotate(0deg); }
      88%  { filter: saturate(0.08) brightness(0.62) contrast(1.06) hue-rotate(0deg); }
      100% { filter: saturate(0)    brightness(0.6)  contrast(1.06); }
    }

    #fan-layer img {
      display: block;
      width: 100%;
      height: auto;
    }

    @media (max-width: 860px) {
      #fan-layer {
        width: 88vw;
        min-width: 0;
        opacity: 0.28;
      }
    }

    .redirect-card {
      width: min(100%, 520px);
      background: rgba(10, 12, 18, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(5px);
      padding: 26px 24px;
      text-align: center;
      position: relative;
      z-index: 3;
    }

    .redirect-card h1 {
      margin: 0 0 10px;
      font-size: clamp(1.15rem, 2.5vw, 1.5rem);
      letter-spacing: 0.8px;
      text-transform: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: pre;
      line-height: 1.1;
      min-height: 1.3em;
    }

    #redirect-title {
      font-variant-caps: all-small-caps;
      font-feature-settings: "smcp" 1, "c2sc" 1;
      letter-spacing: 1.35px;
      font-weight: 700;
    }

    #redirect-title .glitch-char {
      display: inline-block;
      position: relative;
      z-index: 1;
      isolation: isolate;
      color: #06060a;
      text-shadow: 0 0 0.2px rgba(96, 12, 28, 0.45);
      will-change: transform, filter, color;
    }

    #redirect-title .glitch-char::before,
    #redirect-title .glitch-char::after {
      content: attr(data-char);
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      color: transparent;
      -webkit-text-fill-color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
    }

    #redirect-title .glitch-char::before {
      background: linear-gradient(132deg, rgba(158, 28, 48, 0.86) 8%, rgba(94, 12, 29, 0.9) 60%, rgba(172, 44, 40, 0.58) 100%);
      transform: translate(0.24px, -0.22px);
      opacity: 0.62;
      filter: saturate(1.04);
    }

    #redirect-title .glitch-char::after {
      background: linear-gradient(305deg, rgba(182, 40, 56, 0.52) 0%, rgba(82, 10, 24, 0.82) 62%, rgba(138, 26, 34, 0.42) 100%);
      transform: translate(-0.2px, 0.18px);
      opacity: 0.46;
    }

    #redirect-title .glitch-char.space {
      width: 0.38em;
    }

    #redirect-title .glitch-char.space::before,
    #redirect-title .glitch-char.space::after {
      content: none;
    }

    #redirect-title .glitch-char.is-glitching {
      animation: title-glitch 200ms steps(1, end) 1;
    }

    @keyframes title-glitch {
      0% {
        transform: translate(0, 0);
        color: #06060a;
        filter: none;
      }
      20% {
        transform: translate(-1px, 0);
        filter: drop-shadow(-1px 0 rgba(158, 28, 48, 0.72)) drop-shadow(1px 0 rgba(92, 12, 29, 0.6));
      }
      45% {
        transform: translate(1px, -0.5px);
        color: #180d17;
        filter: blur(0.22px) saturate(1.06);
      }
      70% {
        transform: translate(-1px, 0.5px);
        filter: drop-shadow(1px 0 rgba(186, 44, 46, 0.62)) drop-shadow(-1px 0 rgba(98, 14, 24, 0.6));
      }
      100% {
        transform: translate(0, 0);
        color: #06060a;
        filter: none;
      }
    }

    .redirect-card p {
      margin: 0 0 18px;
      color: rgba(255, 255, 255, 0.74);
      font-size: 0.95rem;
    }

    .live-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      background: linear-gradient(135deg, #23252d 0%, #4a4d56 74%, #4f4953 87%, #8a2442 100%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #fff;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      transition: transform 0.15s ease, border-color 0.15s ease;
      box-shadow:
        0 6px 14px rgba(0, 0, 0, 0.36),
        inset -1px -1px 0 rgba(172, 45, 82, 0.28),
        inset 0 -3px 6px rgba(150, 32, 66, 0.15);
    }

    .live-link:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .live-link .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fff;
      animation: live-dot 1.8s ease-in-out infinite;
    }

    @keyframes live-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.28; }
    }
  </style>
  <meta http-equiv="refresh" content="3; url=https://hitpoint.pro/live" />
  <script>
    // JavaScript fallback redirect :P
    setTimeout(() => { window.location.href = "https://hitpoint.pro/live"; }, 3000);

    // Toned-down per-letter glitch for redirect title.
    document.addEventListener("DOMContentLoaded", () => {
      const titleEl = document.getElementById("redirect-title");
      if (!titleEl) return;

      const titleText = titleEl.textContent;
      titleEl.textContent = "";

      const letters = [];
      for (const [index, ch] of [...titleText].entries()) {
        const span = document.createElement("span");
        span.className = "glitch-char";
        span.textContent = ch;
        span.dataset.char = ch;
        if (ch === " ") span.classList.add("space");
        if (/[A-Za-z0-9]/.test(ch)) {
          letters.push({ el: span, index });
        }
        titleEl.appendChild(span);
      }

      const glitchOnce = (entry) => {
        if (Math.random() > 0.2) {
          entry.el.classList.add("is-glitching");
          setTimeout(() => entry.el.classList.remove("is-glitching"), 180 + Math.random() * 90);
        }
      };

      const pulseLetter = (entry) => {
        const base = 700 + (entry.index % 4) * 240;
        const jitter = 500 + Math.random() * 450;
        const wait = base + jitter;

        setTimeout(() => {
          if (!document.body.contains(entry.el)) return;
          glitchOnce(entry);
          pulseLetter(entry);
        }, wait);
      };

      letters.forEach((entry) => {
        const initial = 120 + Math.random() * 640;
        setTimeout(() => {
          if (!document.body.contains(entry.el)) return;
          glitchOnce(entry);
          pulseLetter(entry);
        }, initial);
      });
    });
  </script>

  <main class="redirect-card" aria-live="polite">
    <h1 id="redirect-title">HitPoint ✖ LIVE</h1>
    <p>Redirecting you to the stream now.</p>
    <a class="live-link" href="https://hitpoint.pro/live"><span class="dot"></span>Go to Live</a>
  </main>
</body>

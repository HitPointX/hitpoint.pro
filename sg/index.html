<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Garden</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
background: #000;
overflow: hidden;
cursor: none;
}
canvas { display: block; }

</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
W = canvas.width = window.innerWidth;
H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 
 Color Palette System 

class Palette {
constructor() {
this.hueBase = 0;
this.time = 0;
}
update(dt) {
this.time += dt * 0.02;
this.hueBase = (this.time * 15) % 360;
}
get(n) {
// Return a color from our shifting palette
const hues = [
this.hueBase,
(this.hueBase + 40) % 360,
(this.hueBase + 80) % 360,
(this.hueBase + 160) % 360,
(this.hueBase + 200) % 360,
(this.hueBase + 280) % 360,
];
const idx = Math.floor(n * hues.length) % hues.length;
return `hsl(${hues[idx]}, ${70 + Math.sin(this.time + n) * 15}%, ${55 + Math.cos(this.time * 0.7 + n) * 20}%)`;
}
getGlow(n, alpha = 0.6) {
const hues = [
this.hueBase,
(this.hueBase + 40) % 360,
(this.hueBase + 80) % 360,
(this.hueBase + 160) % 360,
];
const idx = Math.floor(n * hues.length) % hues.length;
return `hsla(${hues[idx]}, 90%, 65%, ${alpha})`;
}
}

// 
 Star System 

class Star {
constructor() { this.init(); }
init() {
this.x = Math.random() * W;
this.y = Math.random() * H;
this.size = Math.random() * 1.8 + 0.2;
this.twinkleSpeed = Math.random() * 2 + 0.5;
this.twinkleOffset = Math.random() * Math.PI * 2;
this.brightness = Math.random();
}
draw(time, palette) {
const twinkle = (Math.sin(time * this.twinkleSpeed + this.twinkleOffset) + 1) / 2;
const alpha = 0.3 + twinkle * 0.7;
ctx.beginPath();
ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
ctx.fillStyle = `rgba(255, 255, ${240 + Math.random() * 15}, ${alpha})`;
ctx.fill();

// Glow for brighter stars
if (this.size > 1.2 && twinkle > 0.7) {
const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 6);
grd.addColorStop(0, `rgba(255, 240, 220, ${alpha * 0.3})`);
grd.addColorStop(1, 'rgba(255, 240, 220, 0)');
ctx.beginPath();
ctx.arc(this.x, this.y, this.size * 6, 0, Math.PI * 2);
ctx.fillStyle = grd;
ctx.fill();
}
}
}

// 
 Nebula Cloud 

class Nebula {
constructor() { this.init(); }
init() {
this.x = Math.random() * W;
this.y = Math.random() * H;
this.radius = Math.random() * 300 + 150;
this.hueOffset = Math.random() * 60 - 30;
this.driftX = (Math.random() - 0.5) * 0.15;
this.driftY = (Math.random() - 0.5) * 0.1;
this.phase = Math.random() * Math.PI * 2;
}
draw(time, palette) {
const x = this.x + Math.sin(time * 0.1 + this.phase) * 30 + this.driftX * time * 10;
const y = this.y + Math.cos(time * 0.08 + this.phase) * 20 + this.driftY * time * 5;

const grd = ctx.createRadialGradient(x, y, 0, x, y, this.radius);
const hue = (palette.hueBase + this.hueOffset + Math.sin(time * 0.1) * 30) % 360;
grd.addColorStop(0, `hsla(${hue}, 80%, 40%, ${0.04 + Math.sin(time * 0.2) * 0.015})`);
grd.addColorStop(0.5, `hsla(${(hue + 30) % 360}, 60%, 30%, ${0.02 + Math.sin(time * 0.15) * 0.01})`);
grd.addColorStop(1, 'hsla(0, 0%, 0%, 0)');

ctx.beginPath();
ctx.arc(x, y, this.radius, 0, Math.PI * 2);
ctx.fillStyle = grd;
ctx.fill();
}
}

// 
 Firefly Particle 

class Firefly {
constructor() { this.init(); }
init() {
this.x = Math.random() * W;
this.y = Math.random() * H;
this.vx = (Math.random() - 0.5) * 0.3;
this.vy = (Math.random() - 0.5) * 0.3;
this.size = Math.random() * 2.5 + 1;
this.phase = Math.random() * Math.PI * 2;
this.glowPhase = Math.random() * Math.PI * 2;
this.wanderRadius = Math.random() * 80 + 40;
this.originX = this.x;
this.originY = this.y;
}
update(time, mouse) {
// Gentle wandering
const dx = mouse.x - this.x;
const dy = mouse.y - this.y;
const dist = Math.sqrt(dx * dx + dy * dy);

if (dist < 200 && dist > 1) {
this.vx += (dx / dist) * 0.015;
this.vy += (dy / dist) * 0.015;
}

// Return to wander area slowly
const wdx = this.originX - this.x;
const wdy = this.originY - this.y;
this.vx += wdx * 0.00003;
this.vy += wdy * 0.00003;

// Damping
this.vx *= 0.995;
this.vy *= 0.995;

this.x += this.vx;
this.y += this.vy;

// Wrap around
if (this.x < -50) this.x = W + 50;
if (this.x > W + 50) this.x = -50;
if (this.y < -50) this.y = H + 50;
if (this.y > H + 50) this.y = -50;
}
draw(time, palette) {
const glow = (Math.sin(time * 1.5 + this.glowPhase) + 1) / 2;
const alpha = 0.3 + glow * 0.7;

// Outer glow
const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 8);
grd.addColorStop(0, `rgba(255, 240, 180, ${alpha * 0.4})`);
grd.addColorStop(0.3, `rgba(255, 200, 100, ${alpha * 0.15})`);
grd.addColorStop(1, 'rgba(255, 180, 60, 0)');

ctx.beginPath();
ctx.arc(this.x, this.y, this.size * 8, 0, Math.PI * 2);
ctx.fillStyle = grd;
ctx.fill();

// Core
ctx.beginPath();
ctx.arc(this.x, this.y, this.size * glow * 0.5 + 0.3, 0, Math.PI * 2);
ctx.fillStyle = `rgba(255, 245, 200, ${alpha})`;
ctx.fill();
}
}

// 
 Flower / Organic Bloom 

class Flower {
constructor(x, y) {
this.x = x;
this.y = y;
this.bloomTime = 0;
this.maxBloom = Math.random() * 0.5 + 0.5;
this.petals = Math.floor(Math.random() * 4) + 5;
this.size = Math.random() * 25 + 15;
this.hueOffset = Math.random() * 360;
this.rotationSpeed = (Math.random() - 0.5) * 0.005;
this.wobble = Math.random() * Math.PI * 2;
this.stemHeight = Math.random() * 80 + 40;
this.alive = true;
this.dying = false;
this.lifeTime = 0;
}
update(dt, time) {
if (this.bloomTime < this.maxBloom) {
this.bloomTime += dt * 0.3;
if (this.bloomTime > this.maxBloom) this.bloomTime = this.maxBloom;
}

// Flowers bloom then slowly fade
this.lifeTime += dt;
if (this.lifeTime > 8 && !this.dying) {
this.dying = true;
}
if (this.dying) {
this.bloomTime -= dt * 0.15;
if (this.bloomTime <= 0) this.alive = false;
}

this.wobble += dt * 0.5;
}
draw(time, palette) {
const bloom = Math.max(0, Math.min(1, this.bloomTime / this.maxBloom));
const alpha = Math.sin(bloom * Math.PI); // Fade in and out smoothly

if (alpha <= 0) return;

const wobbleX = Math.sin(this.wobble + time * 0.3) * 3;
const stemTopY = this.y - this.stemHeight * bloom;
const stemBaseY = this.y;

// Stem
ctx.beginPath();
ctx.moveTo(this.x, stemBaseY);
const cp1x = this.x + Math.sin(time * 0.5 + this.wobble) * 8;
const cp2x = this.x - Math.cos(time * 0.4 + this.wobble) * 6;
ctx.bezierCurveTo(cp1x, stemBaseY - this.stemHeight * bloom * 0.3,
cp2x, stemTopY + this.stemHeight * bloom * 0.3,
this.x + wobbleX, stemTopY);

const stemHue = (palette.hueBase + 90) % 360;
ctx.strokeStyle = `hsla(${stemHue}, 50%, 40%, ${alpha * 0.7})`;
ctx.lineWidth = 2;
ctx.stroke();

// Petals
if (bloom > 0.1) {
const petalSize = this.size * bloom;
const rot = time * this.rotationSpeed + this.wobble;

for (let i = 0; i < this.petals; i++) {
const angle = (i / this.petals) * Math.PI * 2 + rot;
const px = this.x + wobbleX + Math.cos(angle) * petalSize * 0.6;
const py = stemTopY + Math.sin(angle) * petalSize * 0.4;

ctx.save();
ctx.translate(px, py);
ctx.rotate(angle + Math.PI / 2);

// Petal shape using bezier curves
ctx.beginPath();
ctx.moveTo(0, 0);
ctx.bezierCurveTo(
petalSize * 0.3, -petalSize * 0.15,
petalSize * 0.4, petalSize * 0.2,
0, petalSize * 0.5
);
ctx.bezierCurveTo(
-petalSize * 0.4, petalSize * 0.2,
-petalSize * 0.3, -petalSize * 0.15,
0, 0
);

const pHue = (palette.hueBase + this.hueOffset + i * 8) % 360;
ctx.fillStyle = `hsla(${pHue}, 75%, 60%, ${alpha * 0.6})`;
ctx.fill();

// Petal glow
const pgrd = ctx.createRadialGradient(0, petalSize * 0.15, 0, 0, petalSize * 0.15, petalSize * 0.3);
pgrd.addColorStop(0, `hsla(${pHue}, 90%, 80%, ${alpha * 0.2})`);
pgrd.addColorStop(1, `hsla(${pHue}, 90%, 80%, 0)`);
ctx.fillStyle = pgrd;
ctx.fill();

ctx.restore();
}

// Center of flower
const centerGrd = ctx.createRadialGradient(this.x + wobbleX, stemTopY, 0, this.x + wobbleX, stemTopY, petalSize * 0.2);
centerGrd.addColorStop(0, `hsla(${(palette.hueBase + this.hueOffset) % 360}, 80%, 75%, ${alpha * 0.9})`);
centerGrd.addColorStop(1, `hsla(${(palette.hueBase + this.hueOffset) % 360}, 80%, 50%, 0)`);

ctx.beginPath();
ctx.arc(this.x + wobbleX, stemTopY, petalSize * 0.2, 0, Math.PI * 2);
ctx.fillStyle = centerGrd;
ctx.fill();
}
}
}

// 
 Shooting Star 

class ShootingStar {
constructor() {
this.active = false;
this.timer = Math.random() * 5 + 3;
}
update(dt) {
if (!this.active) {
this.timer -= dt;
if (this.timer <= 0) this.launch();
return;
}

this.x += this.vx * dt * 60;
this.y += this.vy * dt * 60;
this.life -= dt;

if (this.life <= 0 || this.x > W + 100 || this.y > H + 100) {
this.active = false;
this.timer = Math.random() * 8 + 4;
}
}
launch() {
this.active = true;
this.x = Math.random() * W * 0.5;
this.y = -20;
const angle = Math.PI / 6 + Math.random() * Math.PI / 4;
const speed = 8 + Math.random() * 6;
this.vx = Math.cos(angle) * speed;
this.vy = Math.sin(angle) * speed;
this.life = 1.5 + Math.random();
this.maxLife = this.life;
}
draw(time, palette) {
if (!this.active) return;

const progress = 1 - this.life / this.maxLife;
const alpha = (1 - progress) * 0.8;
const tailLen = 60 + Math.random() * 20;

// Tail gradient
const grd = ctx.createLinearGradient(
this.x, this.y,
this.x - this.vx * tailLen / 10, this.y - this.vy * tailLen / 10
);
grd.addColorStop(0, `rgba(255, 255, 240, ${alpha})`);
grd.addColorStop(0.3, `rgba(200, 220, 255, ${alpha * 0.5})`);
grd.addColorStop(1, 'rgba(150, 180, 255, 0)');

ctx.beginPath();
ctx.moveTo(this.x, this.y);
ctx.lineTo(
this.x - this.vx * tailLen / 10,
this.y - this.vy * tailLen / 10
);
ctx.strokeStyle = grd;
ctx.lineWidth = 2;
ctx.stroke();

// Head glow
const headGrd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 6);
headGrd.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
headGrd.addColorStop(1, 'rgba(255, 255, 255, 0)');

ctx.beginPath();
ctx.arc(this.x, this.y, 6, 0, Math.PI * 2);
ctx.fillStyle = headGrd;
ctx.fill();
}
}

// 
  Firework Burst 

const BURST_CHANCE = 0.002;
const MAX_BURSTS = 5;

class FireworkBurst {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.particles = [];
    this.sparkles = [];
    this.alive = true;
    this.hasCrackle = Math.random() < 0.3;

    const typeRoll = Math.random();
    let count, speedRange, spread, gravity, drag, lifeRange, hueBase, sat, light;

    if (typeRoll < 0.25) {
      // Peony - full spherical burst
      count = 120 + Math.floor(Math.random() * 80);
      speedRange = [3, 7];
      spread = Math.PI * 2;
      gravity = 0.06;
      drag = 0.975;
      lifeRange = [1.5, 2.5];
    } else if (typeRoll < 0.45) {
      // Chrysanthemum - dense thin petals
      count = 200 + Math.floor(Math.random() * 100);
      speedRange = [2, 5];
      spread = Math.PI * 2;
      gravity = 0.04;
      drag = 0.98;
      lifeRange = [2, 3];
    } else if (typeRoll < 0.6) {
      // Willow - long drooping trails
      count = 80 + Math.floor(Math.random() * 40);
      speedRange = [4, 8];
      spread = Math.PI * 2;
      gravity = 0.12;
      drag = 0.965;
      lifeRange = [3, 4.5];
    } else if (typeRoll < 0.75) {
      // Ring - circular burst
      count = 80 + Math.floor(Math.random() * 40);
      speedRange = [5, 6];
      spread = Math.PI * 2;
      gravity = 0.05;
      drag = 0.97;
      lifeRange = [1.5, 2.5];
    } else if (typeRoll < 0.88) {
      // Double ring - two concentric rings
      count = 100 + Math.floor(Math.random() * 40);
      speedRange = [3, 7];
      spread = Math.PI * 2;
      gravity = 0.05;
      drag = 0.97;
      lifeRange = [1.8, 2.8];
    } else {
      // Crossette - multiple small sub-bursts (simulated)
      count = 60 + Math.floor(Math.random() * 30);
      speedRange = [4, 9];
      spread = Math.PI * 2;
      gravity = 0.07;
      drag = 0.97;
      lifeRange = [1.2, 2];
    }

    // Procedural color palette
    const paletteType = Math.random();
    if (paletteType < 0.2) {
      hueBase = Math.random() * 40 + 15; // Golds and warm yellows
      sat = 90; light = 65;
    } else if (paletteType < 0.35) {
      hueBase = Math.random() * 20 - 10; // Reds and crimsons
      sat = 85; light = 55;
    } else if (paletteType < 0.5) {
      hueBase = Math.random() * 30 + 200; // Blues and cyans
      sat = 90; light = 65;
    } else if (paletteType < 0.6) {
      hueBase = Math.random() * 40 + 120; // Greens
      sat = 80; light = 55;
    } else if (paletteType < 0.7) {
      hueBase = Math.random() * 60 + 270; // Purples and magentas
      sat = 90; light = 60;
    } else if (paletteType < 0.8) {
      hueBase = Math.random() * 360; // Rainbow mix
      sat = 85; light = 65;
    } else if (paletteType < 0.9) {
      hueBase = 45 + Math.random() * 15; // White-gold champagne
      sat = 20; light = 85;
    } else {
      hueBase = Math.random() * 360; // Multi-color with variation
      sat = 95; light = 70;
    }

    const intensity = 0.5 + Math.random() * 0.5;

    for (let i = 0; i < count; i++) {
      let angle, speed;

      if (typeRoll >= 0.75 && typeRoll < 0.88) {
        // Double ring: two speed groups
        const isOuter = Math.random() < 0.5;
        angle = Math.random() * spread;
        speed = isOuter ? speedRange[1] : speedRange[0];
      } else if (typeRoll >= 0.6 && typeRoll < 0.75) {
        // Ring: constrain to a band
        const ringAngle = Math.random() * spread;
        angle = ringAngle;
        speed = (speedRange[0] + speedRange[1]) / 2 + (Math.random() - 0.5) * 0.5;
      } else {
        // Spherical burst: random direction on sphere projected to 2D
        const theta = Math.random() * spread;
        const phi = Math.acos(2 * Math.random() - 1);
        angle = theta;
        speed = speedRange[0] + Math.random() * (speedRange[1] - speedRange[0]);
      }

      const vx = Math.cos(angle) * speed * intensity;
      const vy = Math.sin(angle) * speed * intensity;
      const life = lifeRange[0] + Math.random() * (lifeRange[1] - lifeRange[0]);
      const hueVar = (Math.random() - 0.5) * 30;

      this.particles.push({
        x: this.x,
        y: this.y,
        vx: vx,
        vy: vy,
        gravity: gravity + (Math.random() - 0.5) * 0.02,
        drag: drag - Math.random() * 0.005,
        life: life,
        maxLife: life,
        hue: ((hueBase + hueVar) % 360 + 360) % 360,
        sat: sat + (Math.random() - 0.5) * 10,
        light: light + (Math.random() - 0.5) * 10,
        size: 1.2 + Math.random() * 1.8,
        trail: [],
        sparkleChance: typeRoll >= 0.45 && typeRoll < 0.6 ? 0.3 : (typeRoll === 0.75 ? 0.15 : 0.05),
      });
    }

    // Add a flash at the center on burst
    this.flashAlpha = 0.8;
    this.flashSize = 20 + Math.random() * 15;
  }

  update(dt) {
    if (this.flashAlpha > 0) {
      this.flashAlpha -= dt * 4;
      this.flashSize += dt * 60;
    }

    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      const lifeRatio = p.life / p.maxLife;

      // Store trail position
      if (p.trail.length < 8) {
        p.trail.push({ x: p.x, y: p.y });
      } else {
        p.trail.shift();
        p.trail.push({ x: p.x, y: p.y });
      }

      // Physics
      p.vx *= p.drag;
      p.vy *= p.drag;
      p.vy += p.gravity * dt * 60;

      // Willow type: extra drag when going up (simulates air resistance on drooping trails)
      if (p.vy > 0) {
        p.vx *= 0.998;
      }

      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;

      // Sparkle effect - random bright flashes along the trail
      if (Math.random() < p.sparkleChance * lifeRatio) {
        this.sparkles.push({
          x: p.x + (Math.random() - 0.5) * 4,
          y: p.y + (Math.random() - 0.5) * 4,
          size: 0.5 + Math.random() * 1.5,
          alpha: 0.6 + Math.random() * 0.4,
          life: 0.1 + Math.random() * 0.2,
          maxLife: 0.1 + Math.random() * 0.2,
        });
      }

      // Crackle effect - small random bursts near end of life
      if (this.hasCrackle && lifeRatio < 0.3 && Math.random() < 0.02) {
        for (let j = 0; j < 3; j++) {
          const crackleAngle = Math.random() * Math.PI * 2;
          const crackleSpeed = 0.5 + Math.random() * 1;
          this.sparkles.push({
            x: p.x,
            y: p.y,
            vx: Math.cos(crackleAngle) * crackleSpeed,
            vy: Math.sin(crackleAngle) * crackleSpeed,
            size: 0.5 + Math.random(),
            alpha: 1,
            life: 0.2 + Math.random() * 0.3,
            maxLife: 0.2 + Math.random() * 0.3,
          });
        }
      }

      p.life -= dt;

      if (p.life <= 0) {
        this.particles.splice(i, 1);
      }
    }

    // Update sparkles
    for (let i = this.sparkles.length - 1; i >= 0; i--) {
      const s = this.sparkles[i];
      if (s.vx !== undefined) {
        s.x += s.vx * dt * 60;
        s.y += s.vy * dt * 60;
        s.vy += 0.02 * dt * 60;
      }
      s.life -= dt;
      if (s.life <= 0) {
        this.sparkles.splice(i, 1);
      }
    }

    if (this.particles.length === 0 && this.sparkles.length === 0 && this.flashAlpha <= 0) {
      this.alive = false;
    }
  }

  draw(ctx) {
    // Burst flash
    if (this.flashAlpha > 0) {
      const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.flashSize);
      grd.addColorStop(0, `rgba(255, 255, 240, ${this.flashAlpha * 0.6})`);
      grd.addColorStop(0.3, `rgba(255, 240, 200, ${this.flashAlpha * 0.2})`);
      grd.addColorStop(1, 'rgba(255, 240, 200, 0)');
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.flashSize, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // Draw particle trails
    for (const p of this.particles) {
      const lifeRatio = p.life / p.maxLife;
      if (lifeRatio <= 0) continue;

      // Trail
      if (p.trail.length > 1) {
        ctx.beginPath();
        ctx.moveTo(p.trail[0].x, p.trail[0].y);
        for (let t = 1; t < p.trail.length; t++) {
          ctx.lineTo(p.trail[t].x, p.trail[t].y);
        }
        ctx.lineTo(p.x, p.y);

        const trailAlpha = lifeRatio * 0.4;
        ctx.strokeStyle = `hsla(${p.hue}, ${p.sat}%, ${p.light}%, ${trailAlpha})`;
        ctx.lineWidth = p.size * lifeRatio;
        ctx.lineCap = 'round';
        ctx.stroke();
      }

      // Particle core with glow
      const coreAlpha = Math.pow(lifeRatio, 0.5) * 0.9;
      if (coreAlpha <= 0) continue;

      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 3);
      grd.addColorStop(0, `hsla(${p.hue}, ${Math.min(100, p.sat + 20)}%, ${Math.min(95, p.light + 25)}%, ${coreAlpha})`);
      grd.addColorStop(0.3, `hsla(${p.hue}, ${p.sat}%, ${p.light}%, ${coreAlpha * 0.4})`);
      grd.addColorStop(1, `hsla(${p.hue}, ${p.sat}%, ${p.light}%, 0)`);

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // Draw sparkles (bright white/yellow flashes)
    for (const s of this.sparkles) {
      const alpha = (s.life / s.maxLife) * s.alpha;
      if (alpha <= 0) continue;

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, ${200 + Math.floor(Math.random() * 55)}, ${alpha})`;
      ctx.fill();

      // Tiny sparkle cross
      if (s.size > 1) {
        ctx.strokeStyle = `rgba(255, 255, 240, ${alpha * 0.3})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(s.x - s.size * 2, s.y);
        ctx.lineTo(s.x + s.size * 2, s.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(s.x, s.y - s.size * 2);
        ctx.lineTo(s.x, s.y + s.size * 2);
        ctx.stroke();
      }
    }
  }
}

// 
  Aurora Borealis 

class Aurora {
constructor() {
this.time = 0;
}
draw(time, palette) {
const layers = 3;
for (let l = 0; l < layers; l++) {
const baseY = H * 0.25 + l * H * 0.12;
const hue = (palette.hueBase + l * 60 + Math.sin(time * 0.1) * 30) % 360;

ctx.beginPath();
ctx.moveTo(0, baseY);

for (let x = 0; x <= W; x += 4) {
const y = baseY +
Math.sin(x * 0.003 + time * 0.2 + l) * 40 +
Math.sin(x * 0.007 - time * 0.15 + l * 2) * 25 +
Math.cos(x * 0.001 + time * 0.08) * 60;
ctx.lineTo(x, y);
}

ctx.lineTo(W, H);
ctx.lineTo(0, H);
ctx.closePath();

const grd = ctx.createLinearGradient(0, baseY - 80, 0, baseY + 120);
grd.addColorStop(0, `hsla(${hue}, 70%, 50%, ${0.03 + Math.sin(time * 0.3 + l) * 0.01})`);
grd.addColorStop(0.4, `hsla(${(hue + 20) % 360}, 60%, 40%, ${0.02 + Math.sin(time * 0.25 + l) * 0.008})`);
grd.addColorStop(1, 'hsla(0, 0%, 0%, 0)');

ctx.fillStyle = grd;
ctx.fill();
}
}
}

// 
 Mouse 

const mouse = { x: W / 2, y: H / 2 };
window.addEventListener('mousemove', e => {
mouse.x = e.clientX;
mouse.y = e.clientY;
});
window.addEventListener('touchmove', e => {
e.preventDefault();
mouse.x = e.touches[0].clientX;
mouse.y = e.touches[0].clientY;
}, { passive: false });

// 
  Click to bloom 

const flowers = [];
const bursts = [];
canvas.addEventListener('click', e => {
  for (let i = 0; i < 5; i++) {
    const fx = e.clientX + (Math.random() - 0.5) * 100;
    const fy = e.clientY + (Math.random() - 0.5) * 60;
    flowers.push(new Flower(fx, fy));
  }
  if (bursts.length < MAX_BURSTS) {
    bursts.push(new FireworkBurst(e.clientX, e.clientY));
  }
});

// 
 Initialize Systems 

const palette = new Palette();
const stars = Array.from({ length: 300 }, () => new Star());
const nebulae = Array.from({ length: 8 }, () => new Nebula());
const fireflies = Array.from({ length: 40 }, () => new Firefly());
const shootingStars = [new ShootingStar(), new ShootingStar()];
const aurora = new Aurora();

// Initial flowers
for (let i = 0; i < 12; i++) {
const fx = Math.random() * W;
const fy = H * 0.5 + Math.random() * H * 0.4;
flowers.push(new Flower(fx, fy));
}

// 
 Background gradient 

function drawBackground(time) {
const grd = ctx.createLinearGradient(0, 0, 0, H);
const h1 = (palette.hueBase + 240) % 360;
const h2 = (palette.hueBase + 280) % 360;
grd.addColorStop(0, `hsl(${h1}, 60%, ${3 + Math.sin(time * 0.05) * 1}%)`);
grd.addColorStop(0.5, `hsl(${(h1 + h2) / 2}, 50%, ${2 + Math.sin(time * 0.07) * 0.5}%)`);
grd.addColorStop(1, `hsl(${h2}, 40%, ${1}%)`);

ctx.fillStyle = grd;
ctx.fillRect(0, 0, W, H);
}

// 
 Cursor glow 

function drawCursor(time) {
const grd = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 40);
grd.addColorStop(0, `rgba(255, 240, 200, ${0.15 + Math.sin(time * 2) * 0.05})`);
grd.addColorStop(0.5, `rgba(255, 200, 150, ${0.05 + Math.sin(time * 3) * 0.02})`);
grd.addColorStop(1, 'rgba(255, 180, 100, 0)');

ctx.beginPath();
ctx.arc(mouse.x, mouse.y, 40, 0, Math.PI * 2);
ctx.fillStyle = grd;
ctx.fill();
}

// 
 Ground / Horizon glow 

function drawGround(time) {
const grd = ctx.createLinearGradient(0, H * 0.85, 0, H);
grd.addColorStop(0, 'hsla(0, 0%, 0%, 0)');
grd.addColorStop(1, `hsla(${(palette.hueBase + 200) % 360}, 40%, 8%, ${0.5 + Math.sin(time * 0.1) * 0.1})`);

ctx.fillStyle = grd;
ctx.fillRect(0, H * 0.85, W, H * 0.15);

// Subtle ground line
const lineHue = (palette.hueBase + 120) % 360;
ctx.beginPath();
for (let x = 0; x <= W; x += 2) {
const y = H * 0.87 + Math.sin(x * 0.005 + time * 0.2) * 5;
if (x === 0) ctx.moveTo(x, y);
else ctx.lineTo(x, y);
}
ctx.strokeStyle = `hsla(${lineHue}, 40%, 25%, ${0.15 + Math.sin(time * 0.3) * 0.05})`;
ctx.lineWidth = 1;
ctx.stroke();
}

// 
 Main Loop 

let lastTime = performance.now();
let globalTime = 0;

function animate(now) {
requestAnimationFrame(animate);

const dt = Math.min((now - lastTime) / 1000, 0.05);
lastTime = now;
globalTime += dt;

// Update
palette.update(dt);

// Spawn flowers periodically
if (Math.random() < dt * 0.3 && flowers.length < 60) {
const fx = Math.random() * W;
const fy = H * 0.5 + Math.random() * H * 0.45;
flowers.push(new Flower(fx, fy));
}

// Remove dead flowers
for (let i = flowers.length - 1; i >= 0; i--) {
if (!flowers[i].alive) flowers.splice(i, 1);
else flowers[i].update(dt, globalTime);
}

fireflies.forEach(f => f.update(globalTime, mouse));

// Random burst chance near cursor (trailing stars catching fire)
if (Math.random() < BURST_CHANCE && bursts.length < MAX_BURSTS) {
  const offsetX = (Math.random() - 0.5) * 40;
  const offsetY = (Math.random() - 0.5) * 40;
  bursts.push(new FireworkBurst(mouse.x + offsetX, mouse.y + offsetY));
}

// Update active bursts
for (let i = bursts.length - 1; i >= 0; i--) {
  bursts[i].update(dt);
  if (!bursts[i].alive) bursts.splice(i, 1);
}

// 
 Draw 

drawBackground(globalTime);

// Nebulae (behind everything)
nebulae.forEach(n => n.draw(globalTime, palette));

// Aurora
aurora.draw(globalTime, palette);

// Stars
stars.forEach(s => s.draw(globalTime, palette));

// Ground
drawGround(globalTime);

// Flowers
flowers.forEach(f => f.draw(globalTime, palette));

// Fireflies
fireflies.forEach(f => f.draw(globalTime, palette));

// Shooting stars
shootingStars.forEach(ss => { ss.update(dt); ss.draw(globalTime, palette); });

// Firework bursts
bursts.forEach(b => b.draw(ctx));

// Cursor glow (on top)
drawCursor(globalTime);

// Vignette
const vigGrd = ctx.createRadialGradient(W / 2, H / 2, W * 0.3, W / 2, H / 2, W * 0.75);
vigGrd.addColorStop(0, 'rgba(0,0,0,0)');
vigGrd.addColorStop(1, 'rgba(0,0,0,0.4)');
ctx.fillStyle = vigGrd;
ctx.fillRect(0, 0, W, H);
}

requestAnimationFrame(animate);
</script>
